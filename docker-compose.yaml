# nginx proxy address - http://172.17.0.1:58003

name: composecraft
x-logging: &default-logging
  options:
    max-size: '5m'
    max-file: '1'
  driver: json-file

services:
  app:
    image: composecraft/composecraft:latest
    container_name: composecraft-app
    hostname: ${BASE_HOST_NAME:-$HOSTNAME}
    restart: always
    pull_policy: always
    logging: *default-logging
    environment:
      TZ: ${TZ:-America/New_York}
      CORE_ONLY: false
      URL: https://${BASE_HOST_NAME:-localhost}
      SECRET_KEY: ${APP_SECRET_KEY:-changeme_secret_key_min_32_chars}
      MONGODB_URI: mongodb://${DB_ADMIN_NAME:-composecraft}:${DB_ADMIN_PASS:-changeme_admin_password}@composecraft-db
    ports:
      - '172.17.0.1:58003:3000'
    healthcheck:
      test: ['CMD-SHELL', 'curl -f http://localhost:3000 || exit 1']
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 90s
    depends_on:
      db:
        condition: service_healthy
    networks:
      - composecraft

  db:
    image: mongo:latest
    container_name: composecraft-db
    hostname: composecraft-db
    restart: always
    pull_policy: always
    logging: *default-logging
    environment:
      TZ: ${TZ:-America/New_York}
      MONGO_INITDB_ROOT_USERNAME: ${DB_ADMIN_NAME:-composecraft}
      MONGO_INITDB_ROOT_PASSWORD: ${DB_ADMIN_PASS:-changeme_admin_password}
    volumes:
      - './volumes/data/db/mongodb/composecraft:/data/db'
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --eval 'db.adminCommand(\"ping\").ok' || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 10s
    networks:
      - composecraft

networks:
  composecraft:
    name: composecraft
    external: false
